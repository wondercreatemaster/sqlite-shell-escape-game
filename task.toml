# Task configuration schema version
version = "2.0"

# Task metadata (author, difficulty, categorization)
[metadata]
author_name = "anonymous"
author_email = "anonymous"
difficulty = "hard"
category = "security"
# Options for subcategories are: "long_context", "tool_specific", "api_integration", "db_interaction", "ui_building"
subcategories = [ "db_interaction", "tool_specific",]
# The number of milestones in the task (can be zero if not a milestone task)
number_of_milestones = 0
# Size of the codebase: minimal -> 0-20 files, small -> 20+ files, large -> 200+ files
codebase_size = "minimal"
# Coding languages used in the oracle solution or required by the agent
languages = [ "java", "sql", "shell",]
# For tool_specific, api_integration, and db_interaction subcategories, please include specific tool, api framework, or database software
tags = [ "sqlite", "coreutils", "jdbc", "java",]
# Estimated time to complete (minutes)
expert_time_estimate_min = 120
junior_time_estimate_min = 240

# Files referenced by the task and its verifier:
# - /app/game/escape.db          (SQLite database that must be hardened in place)
# - /app/game/policy.bin         (binary policy blob the migration must parse)
# - /app/coreutils-9.5.tar.gz    (staged GNU coreutils 9.5 source tarball; offline)
# - /opt/seed/seed.sql           (build-time only: used to create the initial DB)
# - /opt/java-libs/              (optional SQLite JDBC driver, if solving via Java)
# - tests/seed_reference.sql     (verifier-only trusted copy of the pristine seed)
# - tests/policy.bin             (verifier-only trusted copy of the policy blob)
#
# Anti-tamper: the verifier derives the expected hardened state solely from
# trusted inputs it carries (tests/seed_reference.sql and an embedded coreutils
# 9.5 utility set); it never reads agent-writable files (/opt/seed/seed.sql,
# /app/coreutils-9.5.tar.gz) when computing the reference.
#
# The verifier has no third-party dependencies: tests/test.sh runs the checks
# with the system-wide Python standard library only (sqlite3, hashlib), so
# nothing needs to be installed at build or test time.

# Verifier: runs the test script to check task completion
[verifier]
timeout_sec = 450.0

# Agent: limits how long the agent can run when attempting the task
[agent]
timeout_sec = 900.0

# Sandbox environment limits
[environment]
allow_internet = false
build_timeout_sec = 900.0
cpus = 2
memory_mb = 4096
storage_mb = 10240
